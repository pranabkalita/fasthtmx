<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>403 – Access Denied | FastAuth</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-6">

  <!-- Background decoration -->
  <div class="pointer-events-none absolute inset-0 overflow-hidden">
    <div class="absolute -top-40 -right-40 h-96 w-96 rounded-full bg-red-600/10 blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 h-96 w-96 rounded-full bg-violet-600/10 blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-lg">

    <!-- Card -->
    <div class="rounded-3xl border border-white/10 bg-white/5 p-10 shadow-2xl backdrop-blur-xl text-center">

      <!-- Shield icon -->
      <div class="mx-auto mb-6 flex h-20 w-20 items-center justify-center rounded-2xl bg-red-500/15 ring-1 ring-red-500/30">
        <svg class="h-10 w-10 text-red-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.955 11.955 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" />
        </svg>
      </div>

      <!-- Error code -->
      <p class="mb-1 text-sm font-semibold tracking-widest text-red-400 uppercase">Error 403</p>

      <!-- Headline -->
      <h1 class="mb-3 text-3xl font-bold text-white">Access Denied</h1>

      <!-- Description -->
      <p class="mb-2 text-slate-400 leading-relaxed">
        You don't have permission to view this page.
        This area is restricted to <span class="font-medium text-slate-300">administrators</span> only.
      </p>
      <p class="mb-8 text-sm text-slate-500">
        If you believe this is a mistake, please contact your system administrator.
      </p>

      <!-- Actions -->
      <div class="flex flex-col gap-3 sm:flex-row sm:justify-center">
        <a href="/dashboard"
           class="inline-flex items-center justify-center gap-2 rounded-xl bg-violet-600 px-6 py-3 text-sm font-semibold text-white shadow-lg shadow-violet-500/25 transition hover:bg-violet-500 active:scale-95">
          <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
          </svg>
          Go to Dashboard
        </a>
        <a href="/"
           class="inline-flex items-center justify-center gap-2 rounded-xl border border-white/10 bg-white/5 px-6 py-3 text-sm font-semibold text-slate-300 transition hover:bg-white/10 hover:text-white active:scale-95">
          <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          Back to Home
        </a>
      </div>

    </div>

    <!-- Branding -->
    <p class="mt-8 text-center text-xs text-slate-600">
      &copy; 2026 FastAuth &mdash; Secure Authentication Platform
    </p>

  </div>
</body>
</html>
