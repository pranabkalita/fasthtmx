<!-- Mobile top bar (hidden on lg+) -->
<div class="fixed inset-x-0 top-0 z-40 flex items-center justify-between border-b border-slate-200 bg-white/95 px-4 py-3 backdrop-blur-sm lg:hidden">
  <button id="sidebar-open" aria-label="Open menu"
          class="rounded-lg p-2 text-slate-600 hover:bg-slate-100 active:bg-slate-200">
    <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
    </svg>
  </button>
  <div class="flex items-center gap-2">
    <span class="inline-flex h-7 w-7 items-center justify-center rounded-lg bg-emerald-100 text-xs font-bold text-emerald-700">FA</span>
    <span class="text-sm font-semibold text-slate-900">FastAuth</span>
  </div>
  <!-- Spacer to keep logo centred -->
  <div class="w-9"></div>
</div>

<!-- Backdrop overlay -->
<div id="sidebar-backdrop"
     class="fixed inset-0 z-40 hidden bg-black/40 lg:hidden"></div>

<!-- Sidebar – drawer on mobile, sticky panel on desktop -->
<aside id="sidebar"
       class="fixed inset-y-0 left-0 z-50 w-64 -translate-x-full overflow-y-auto border-r border-slate-200 bg-white p-4 shadow-2xl transition-transform duration-300 ease-in-out
              lg:sticky lg:inset-auto lg:top-6 lg:z-auto lg:h-[calc(100vh-3rem)] lg:w-auto lg:translate-x-0 lg:overflow-visible lg:rounded-2xl lg:border lg:shadow-sm lg:bg-white/90">

  <!-- Header row with close button on mobile -->
  <div class="mb-6 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-emerald-100 text-sm font-bold text-emerald-700">FA</span>
      <div>
        <p class="text-sm font-semibold text-slate-900">FastAuth</p>
        <p class="text-xs text-slate-500">Security Dashboard</p>
      </div>
    </div>
    <button id="sidebar-close" aria-label="Close menu"
            class="rounded-lg p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-600 lg:hidden">
      <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <p class="mb-2 px-2 text-[11px] font-semibold uppercase tracking-wider text-slate-400">General</p>
  <nav class="space-y-1">
    <a href="/dashboard" class="flex items-center rounded-lg px-3 py-2 text-sm {{ 'bg-emerald-50 font-semibold text-emerald-700' if active_page == 'dashboard' else 'text-slate-600 hover:bg-slate-100' }}">Dashboard</a>
    <a href="/dashboard/profile" class="flex items-center rounded-lg px-3 py-2 text-sm {{ 'bg-emerald-50 font-semibold text-emerald-700' if active_page == 'profile' else 'text-slate-600 hover:bg-slate-100' }}">Profile</a>
    <a href="/sessions" class="flex items-center rounded-lg px-3 py-2 text-sm {{ 'bg-emerald-50 font-semibold text-emerald-700' if active_page == 'sessions' else 'text-slate-600 hover:bg-slate-100' }}">Sessions</a>
  </nav>

  <p class="mb-2 mt-6 px-2 text-[11px] font-semibold uppercase tracking-wider text-slate-400">Support</p>
  <nav class="space-y-1">
    {% if user.is_admin %}
      <a href="/admin/audit-logs" class="flex items-center rounded-lg px-3 py-2 text-sm {{ 'bg-emerald-50 font-semibold text-emerald-700' if active_page == 'audit' else 'text-slate-600 hover:bg-slate-100' }}">Audit Logs</a>
      <a href="/dev/email-previews" class="flex items-center rounded-lg px-3 py-2 text-sm {{ 'bg-emerald-50 font-semibold text-emerald-700' if active_page == 'email_previews' else 'text-slate-600 hover:bg-slate-100' }}">Email Previews</a>
    {% endif %}
  </nav>

  <div class="mt-8 rounded-xl border border-slate-200 bg-slate-50 p-3">
    <p class="text-xs font-semibold text-slate-700">{{ user.full_name or user.email }}</p>
    <p class="mt-1 text-xs text-slate-500">{{ user.email }}</p>
    <span class="mt-2 inline-flex rounded-full px-2 py-1 text-[11px] font-semibold {{ 'bg-emerald-100 text-emerald-700' if user.is_verified else 'bg-amber-100 text-amber-700' }}">
      {{ 'Verified' if user.is_verified else 'Not Verified' }}
    </span>
    <form action="/logout" method="post" class="mt-3">
      <button type="submit" class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-xs font-semibold text-slate-700 hover:bg-slate-100">
        Logout
      </button>
    </form>
  </div>
</aside>

<script>
  (function () {
    var sidebar = document.getElementById('sidebar');
    var backdrop = document.getElementById('sidebar-backdrop');
    var openBtn = document.getElementById('sidebar-open');
    var closeBtn = document.getElementById('sidebar-close');
    function openSidebar() {
      sidebar.classList.remove('-translate-x-full');
      backdrop.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }
    function closeSidebar() {
      sidebar.classList.add('-translate-x-full');
      backdrop.classList.add('hidden');
      document.body.style.overflow = '';
    }
    if (openBtn) openBtn.addEventListener('click', openSidebar);
    if (closeBtn) closeBtn.addEventListener('click', closeSidebar);
    if (backdrop) backdrop.addEventListener('click', closeSidebar);
  })();
</script>
