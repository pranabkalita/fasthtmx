{% extends 'layouts/dashboard_base.html' %}
{% set active_page = 'email_previews' %}
{% block dashboard_body %}
  <section class="space-y-4">
    <div class="rounded-2xl border border-slate-200 bg-white/90 p-5 shadow-sm">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
          <h1 class="text-lg font-semibold text-slate-900">Email HTML Preview</h1>
          <p class="text-sm text-slate-500">Template: {{ template_name }}</p>
        </div>
        <div class="flex items-center gap-2">
          <a href="/email-previes" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-xs font-semibold text-slate-700 hover:bg-slate-100">Back</a>
          <a href="/email-previes/{{ template_name }}/text" class="rounded-lg bg-emerald-600 px-3 py-2 text-xs font-semibold text-white hover:bg-emerald-500">View Text</a>
        </div>
      </div>
    </div>

    <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
      <div class="overflow-auto rounded-xl border border-slate-200 bg-slate-50">
        <iframe
          title="Email HTML Preview"
          class="h-[720px] w-full min-w-[320px] bg-white"
          sandbox="allow-same-origin"
          srcdoc="{{ html_body | e }}"
        ></iframe>
      </div>
    </div>
  </section>
{% endblock %}
