{% extends 'layouts/dashboard_base.html' %}
{% set active_page = 'email_previews' %}
{% block dashboard_body %}
  <div class="rounded-2xl border border-slate-200 bg-white/90 p-6 shadow-sm">
    <h1 class="text-2xl font-bold tracking-tight text-slate-900">Email Previews</h1>
    <p class="mt-1 text-sm text-slate-500">Admin preview tools for transactional email templates.</p>

    <ul class="mt-6 space-y-3">
      {% for name in template_names %}
        <li class="flex flex-wrap items-center justify-between gap-3 rounded-xl border border-slate-200 bg-slate-50 px-4 py-3">
          <span class="text-sm font-semibold text-slate-800">{{ name }}</span>
          <div class="flex items-center gap-2">
            <a href="/email-previes/{{ name }}" class="rounded-lg bg-emerald-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-emerald-500">HTML</a>
            <a href="/email-previes/{{ name }}/text" class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs font-semibold text-slate-700 hover:bg-slate-100">Text</a>
          </div>
        </li>
      {% endfor %}
    </ul>
  </div>
{% endblock %}
