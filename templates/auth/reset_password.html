{% extends 'base.html' %}
{% block content %}
<section class="mx-auto max-w-md rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
  <h1 class="mb-1 text-lg font-semibold tracking-tight">Reset Password</h1>
  <p class="mb-4 text-sm text-slate-600">Set a new password for your account.</p>
  {% if reset_password_error %}
    <div class="mb-3 rounded-lg border border-rose-200 bg-rose-50 px-3 py-2 text-sm font-medium text-rose-700">
      {{ reset_password_error }}
    </div>
  {% endif %}
  <form action="/reset-password" method="post" class="space-y-3">
    <input type="hidden" name="token" value="{{ token }}" />
    <label class="block text-sm">
      <span class="mb-1 block text-slate-700">New Password</span>
      <input type="password" name="new_password" autocomplete="new-password" minlength="8" required class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-slate-500" />
    </label>
    <label class="block text-sm">
      <span class="mb-1 block text-slate-700">Retype New Password</span>
      <input type="password" name="confirm_new_password" autocomplete="new-password" minlength="8" required class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-slate-500" />
    </label>
    <p class="text-xs text-slate-500">Use at least 8 characters with uppercase, lowercase, number, and special character.</p>
    <button type="submit" class="w-full rounded-md bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-800">Update Password</button>
  </form>
</section>
{% endblock %}
