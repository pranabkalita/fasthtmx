{% extends 'base.html' %}
{% block content %}
<section class="mx-auto max-w-md rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
  <h1 class="mb-1 text-lg font-semibold tracking-tight">Forgot Password</h1>
  <p class="mb-4 text-sm text-slate-600">Enter your email to receive a reset link.</p>
  <form action="/forgot-password" method="post" class="space-y-3">
    <label class="block text-sm">
      <span class="mb-1 block text-slate-700">Email</span>
      <input type="email" name="email" required class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-slate-500" />
    </label>
    <button type="submit" class="w-full rounded-md bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-800">Send Reset Link</button>
  </form>
</section>
{% endblock %}
