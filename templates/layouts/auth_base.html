<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }} · FastAuth</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/css/app.css?v=20260401a" />
  <script src="/static/js/htmx.min.js?v=20260401a"></script>
  <style>
    body { font-family: "Manrope", "Segoe UI", "Helvetica Neue", sans-serif; }
    #top-progress { position: fixed; top: 0; left: 0; height: 3px; width: 0; z-index: 80; background: #0f6d58; opacity: 0; transition: opacity 120ms ease; }
    #top-progress.active { opacity: 1; animation: progress-grow 1.2s ease-out forwards; }
    #top-progress.done { width: 100% !important; transition: width 120ms ease-out, opacity 120ms ease-out; opacity: 0; }
    #toast-container { position: fixed; top: 16px; right: 16px; z-index: 90; display: flex; flex-direction: column; gap: 8px; width: min(360px, calc(100vw - 24px)); }
    .toast-enter { opacity: 0; transform: translateY(-8px) scale(0.98); }
    .toast-show { opacity: 1; transform: translateY(0) scale(1); transition: opacity 180ms ease, transform 180ms ease; }
    .toast-hide { opacity: 0; transform: translateY(-8px) scale(0.98); transition: opacity 160ms ease, transform 160ms ease; }
    @keyframes progress-grow { 0% { width: 0; } 70% { width: 72%; } 100% { width: 84%; } }
  </style>
</head>
<body data-layout="auth" hx-boost="true" hx-target="main" hx-select="main" hx-swap="outerHTML" hx-push-url="true">
  <div id="top-progress" aria-hidden="true"></div>
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <main class="w-[calc(100%-1.5rem)] max-w-none mx-auto pb-4 pt-0 lg:pt-8">
    {% include "components/toasts.html" %}
    {% block content %}{% endblock %}
  </main>

  <script src="/static/js/base.js?v=20260327c"></script>
  <script src="/static/js/progress.js?v=20260327b"></script>
</body>
</html>
