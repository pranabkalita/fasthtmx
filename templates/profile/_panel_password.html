<article class="rounded-2xl border border-slate-200 bg-white/90 p-5 shadow-sm">
  <div class="mb-4 flex items-start justify-between gap-3">
    <div>
      <h2 class="text-lg font-bold text-slate-900">Change Password</h2>
      <p class="text-sm text-slate-600">Use a strong password and keep it unique.</p>
    </div>
    <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-700">Credentials</span>
  </div>
  {% if change_password_error %}
    <div class="mb-3 rounded-lg border border-rose-200 bg-rose-50 px-3 py-2 text-sm font-medium text-rose-700">
      {{ change_password_error }}
    </div>
  {% endif %}
  <form action="/profile/change-password" method="post" class="space-y-3">
    <label class="block text-sm">
      <span class="mb-1 block font-medium text-slate-700">Current password</span>
      <input type="password" name="current_password" autocomplete="current-password" placeholder="Enter current password" required class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm" />
    </label>
    <label class="block text-sm">
      <span class="mb-1 block font-medium text-slate-700">New password</span>
      <input type="password" name="new_password" autocomplete="new-password" minlength="8" placeholder="Enter new password" required class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm" />
    </label>
    <label class="block text-sm">
      <span class="mb-1 block font-medium text-slate-700">Retype new password</span>
      <input type="password" name="confirm_new_password" autocomplete="new-password" minlength="8" placeholder="Retype new password" required class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm" />
    </label>
    <p class="text-xs text-slate-500">Use at least 8 characters with uppercase, lowercase, number, and special character.</p>
    <div class="flex justify-end border-t border-slate-100 pt-3">
      <button type="submit" class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50">Update Password</button>
    </div>
  </form>
</article>
