<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ subject }} - {{ product_name }}</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f3f6f9;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: #0f172a;
      }
      .container {
        width: 100%;
        background-color: #f3f6f9;
        padding: 24px 0;
      }
      .card {
        width: 100%;
        max-width: 620px;
        margin: 0 auto;
        background: #ffffff;
        border: 1px solid #dbe4ea;
        border-radius: 14px;
        overflow: hidden;
      }
      .header {
        background: linear-gradient(135deg, #0f6d58 0%, #1b8f72 100%);
        padding: 22px 24px;
      }
      .brand-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .badge {
        display: inline-block;
        width: 34px;
        height: 34px;
        line-height: 34px;
        text-align: center;
        border-radius: 10px;
        background: #d8f3ea;
        color: #0f6d58;
        font-weight: 800;
        font-size: 14px;
      }
      .brand-name {
        color: #ffffff;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.2px;
      }
      .brand-sub {
        margin-top: 4px;
        color: #d8f3ea;
        font-size: 12px;
      }
      .content {
        padding: 24px;
      }
      .title {
        margin: 0 0 10px;
        font-size: 22px;
        line-height: 1.2;
        color: #0f172a;
      }
      .body {
        margin: 0;
        font-size: 15px;
        line-height: 1.65;
        color: #334155;
      }
      .spacer {
        height: 18px;
      }
      .cta-wrap {
        margin: 20px 0;
      }
      .cta {
        display: inline-block;
        padding: 12px 18px;
        border-radius: 10px;
        background: #0f6d58;
        color: #ffffff !important;
        text-decoration: none;
        font-weight: 700;
        font-size: 14px;
      }
      .meta {
        margin-top: 18px;
        padding: 14px;
        border: 1px solid #dbe4ea;
        border-radius: 10px;
        background: #f8fafc;
        font-size: 13px;
        color: #475569;
        line-height: 1.6;
        word-break: break-word;
      }
      .meta a {
        color: #0f6d58;
      }
      .footer {
        padding: 18px 24px 24px;
        font-size: 12px;
        color: #64748b;
        line-height: 1.6;
      }
      .footer a {
        color: #0f6d58;
        text-decoration: none;
      }
      .divider {
        border-top: 1px solid #e2e8f0;
        margin: 0 24px;
      }
      @media only screen and (max-width: 640px) {
        .container {
          padding: 12px;
        }
        .content,
        .footer,
        .header {
          padding-left: 16px;
          padding-right: 16px;
        }
        .title {
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;mso-hide:all;">
      {{ preheader }}
    </div>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" class="container">
      <tr>
        <td align="center">
          <table role="presentation" cellpadding="0" cellspacing="0" class="card">
            <tr>
              <td class="header">
                <div class="brand-row">
                  <span class="badge">FA</span>
                  <div>
                    <div class="brand-name">{{ product_name }}</div>
                    <div class="brand-sub">Secure identity platform</div>
                  </div>
                </div>
              </td>
            </tr>
            <tr>
              <td class="content">
                {% block email_content %}{% endblock %}
              </td>
            </tr>
            <tr>
              <td><div class="divider"></div></td>
            </tr>
            <tr>
              <td class="footer">
                <div>
                  This is an automated security email from {{ product_name }}.
                </div>
                <div>
                  <a href="{{ website_url }}">{{ website_url }}</a> | Support: <a href="mailto:{{ support_email }}">{{ support_email }}</a>
                </div>
                <div>
                  &copy; {{ year }} {{ product_name }}. All rights reserved.
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
