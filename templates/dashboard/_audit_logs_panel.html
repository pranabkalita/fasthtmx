<section id="audit-logs-panel" class="rounded-2xl border border-slate-200 bg-white/90 p-5 shadow-sm">
  <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
    <h1 class="text-base font-semibold text-slate-900">Audit Logs (Admin)</h1>
    <span class="text-xs text-slate-500">Total: {{ total_items }}</span>
  </div>

  <form
    action="/audit-logs"
    method="get"
    hx-get="/audit-logs"
    hx-target="#audit-logs-panel"
    hx-select="#audit-logs-panel"
    hx-swap="outerHTML"
    hx-push-url="true"
    class="mb-4 grid gap-3 rounded-xl border border-slate-200 bg-slate-50 p-3 md:grid-cols-4"
  >
    <input type="hidden" name="page" value="1" />

    <label class="text-xs text-slate-600">
      Action
      <input
        type="text"
        name="action"
        value="{{ filters.action }}"
        placeholder="LOGIN"
        class="mt-1 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800"
      />
    </label>

    <label class="text-xs text-slate-600">
      Target
      <input
        type="text"
        name="target"
        value="{{ filters.target }}"
        placeholder="session"
        class="mt-1 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800"
      />
    </label>

    <label class="text-xs text-slate-600">
      User ID
      <input
        type="text"
        name="user_id"
        value="{{ filters.user_id }}"
        placeholder="UUID"
        class="mt-1 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800"
      />
    </label>

    <label class="text-xs text-slate-600">
      IP Address
      <input
        type="text"
        name="ip_address"
        value="{{ filters.ip_address }}"
        placeholder="127.0.0.1"
        class="mt-1 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800"
      />
    </label>

    <label class="text-xs text-slate-600">
      From Date
      <input
        type="date"
        name="from_date"
        value="{{ filters.from_date or '' }}"
        class="mt-1 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800"
      />
    </label>

    <label class="text-xs text-slate-600">
      To Date
      <input
        type="date"
        name="to_date"
        value="{{ filters.to_date or '' }}"
        class="mt-1 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800"
      />
    </label>

    <label class="text-xs text-slate-600">
      Per Page
      <select
        name="per_page"
        class="mt-1 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800"
      >
        {% for size in [10, 25, 50, 100] %}
          <option value="{{ size }}" {% if per_page == size %}selected{% endif %}>{{ size }}</option>
        {% endfor %}
      </select>
    </label>

    <div class="flex items-end gap-2">
      <button type="submit" class="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-500">Apply</button>
      <a
        href="/audit-logs"
        hx-get="/audit-logs"
        hx-target="#audit-logs-panel"
        hx-select="#audit-logs-panel"
        hx-swap="outerHTML"
        hx-push-url="true"
        class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100"
      >Reset</a>
    </div>
  </form>

  <div class="overflow-x-auto rounded-xl border border-slate-200">
    <table class="w-full text-left text-sm">
      <thead class="text-slate-600">
        <tr>
          <th class="bg-slate-50 px-4 py-3">When</th>
          <th class="bg-slate-50 px-4 py-3">Action</th>
          <th class="bg-slate-50 px-4 py-3">Target</th>
          <th class="bg-slate-50 px-4 py-3">User</th>
          <th class="bg-slate-50 px-4 py-3">IP</th>
        </tr>
      </thead>
      <tbody class="text-slate-800">
        {% for row in logs %}
          <tr class="border-t border-slate-100">
            <td class="px-4 py-3">{{ row.created_at }}</td>
            <td class="px-4 py-3">{{ row.action }}</td>
            <td class="px-4 py-3">{{ row.target }}</td>
            <td class="px-4 py-3">{{ row.user_id or '-' }}</td>
            <td class="px-4 py-3">{{ row.ip_address or '-' }}</td>
          </tr>
        {% else %}
          <tr><td class="px-4 py-4" colspan="5">No logs for current filters.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

  <div class="mt-4 flex flex-wrap items-center justify-between gap-3">
    <span class="text-xs text-slate-500">Page {{ page }} of {{ total_pages }}</span>
    <div class="flex items-center gap-2">
      <form
        action="/audit-logs"
        method="get"
        hx-get="/audit-logs"
        hx-target="#audit-logs-panel"
        hx-select="#audit-logs-panel"
        hx-swap="outerHTML"
        hx-push-url="true"
      >
        <input type="hidden" name="action" value="{{ filters.action }}" />
        <input type="hidden" name="target" value="{{ filters.target }}" />
        <input type="hidden" name="user_id" value="{{ filters.user_id }}" />
        <input type="hidden" name="ip_address" value="{{ filters.ip_address }}" />
        <input type="hidden" name="from_date" value="{{ filters.from_date or '' }}" />
        <input type="hidden" name="to_date" value="{{ filters.to_date or '' }}" />
        <input type="hidden" name="per_page" value="{{ per_page }}" />
        <input type="hidden" name="page" value="{{ page - 1 if has_prev else page }}" />
        <button type="submit" {% if not has_prev %}disabled{% endif %} class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-xs font-semibold text-slate-700 hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-50">Previous</button>
      </form>

      <form
        action="/audit-logs"
        method="get"
        hx-get="/audit-logs"
        hx-target="#audit-logs-panel"
        hx-select="#audit-logs-panel"
        hx-swap="outerHTML"
        hx-push-url="true"
      >
        <input type="hidden" name="action" value="{{ filters.action }}" />
        <input type="hidden" name="target" value="{{ filters.target }}" />
        <input type="hidden" name="user_id" value="{{ filters.user_id }}" />
        <input type="hidden" name="ip_address" value="{{ filters.ip_address }}" />
        <input type="hidden" name="from_date" value="{{ filters.from_date or '' }}" />
        <input type="hidden" name="to_date" value="{{ filters.to_date or '' }}" />
        <input type="hidden" name="per_page" value="{{ per_page }}" />
        <input type="hidden" name="page" value="{{ page + 1 if has_next else page }}" />
        <button type="submit" {% if not has_next %}disabled{% endif %} class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-xs font-semibold text-slate-700 hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-50">Next</button>
      </form>
    </div>
  </div>
</section>
