<article class="rounded-2xl border border-slate-200 bg-white/90 p-5 shadow-sm">
  <div class="mb-4 flex items-start justify-between gap-3">
    <div>
      <h2 class="text-lg font-bold text-slate-900">2FA</h2>
      <p class="text-sm text-slate-600">Add an extra layer of security with an authenticator app.</p>
    </div>
    {% if user.two_factor_enabled %}
      <span class="rounded-full bg-emerald-100 px-3 py-1 text-xs font-semibold text-emerald-700">Enabled</span>
    {% else %}
      <span class="rounded-full bg-amber-100 px-3 py-1 text-xs font-semibold text-amber-700">Disabled</span>
    {% endif %}
  </div>
  {% if error %}
    <div class="mb-3 rounded-lg border border-rose-200 bg-rose-50 px-3 py-2 text-sm font-medium text-rose-700">
      {{ error }}
    </div>
  {% endif %}
  {% if user.two_factor_enabled %}
    <form action="/profile/2fa/disable" method="post" class="space-y-3">
      <input type="password" name="password" placeholder="Confirm password to disable 2FA" required class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm" />
      <div class="flex justify-end border-t border-slate-100 pt-3">
        <button type="submit" class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50">Disable 2FA</button>
      </div>
    </form>
  {% else %}
    <div class="flex flex-col gap-3 rounded-xl border border-emerald-100 bg-emerald-50/60 p-4 sm:flex-row sm:items-center sm:justify-between">
      <p class="text-sm text-slate-700">2FA is currently disabled for this account.</p>
      <a href="/profile/2fa/setup" class="shrink-0 rounded-lg bg-emerald-600 px-4 py-2 text-center text-sm font-semibold text-white hover:bg-emerald-500">Enable 2FA</a>
    </div>
  {% endif %}
</article>
