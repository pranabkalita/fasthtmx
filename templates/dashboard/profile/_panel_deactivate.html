<article class="rounded-2xl border border-rose-200 bg-rose-50/50 p-5 shadow-sm">
  <div class="mb-4 flex items-start justify-between gap-3">
    <div>
      <h2 class="text-lg font-bold text-rose-700">Deactivate Account</h2>
      <p class="text-sm text-rose-700/80">This will disable your account access until reactivated by support.</p>
    </div>
    <span class="rounded-full bg-rose-100 px-3 py-1 text-xs font-semibold text-rose-700">Danger Zone</span>
  </div>
  {% if error %}
    <div class="mb-3 rounded-lg border border-rose-200 bg-rose-50 px-3 py-2 text-sm font-medium text-rose-700">
      {{ error }}
    </div>
  {% endif %}
  <form action="/profile/deactivate-account" method="post" class="space-y-3">
    <input type="password" name="password" placeholder="Confirm password" required class="w-full rounded-lg border border-rose-300 bg-white px-3 py-2 text-sm shadow-sm" />
    <div class="flex justify-end border-t border-rose-200 pt-3">
      <button type="submit" class="rounded-lg border border-rose-400 px-4 py-2 text-sm font-semibold text-rose-700 hover:bg-rose-100">Deactivate Account</button>
    </div>
  </form>
</article>
