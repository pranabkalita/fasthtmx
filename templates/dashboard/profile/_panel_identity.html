<article class="rounded-2xl border border-slate-200 bg-white/90 p-5 shadow-sm">
  <div class="mb-4 flex items-start justify-between gap-3">
    <div>
      <h2 class="text-lg font-bold text-slate-900">Profile</h2>
      <p class="text-sm text-slate-600">Update your display name and primary email address.</p>
    </div>
    <span class="rounded-full bg-emerald-100 px-3 py-1 text-xs font-semibold text-emerald-700">Identity</span>
  </div>
  {% if error %}
    <div class="mb-3 rounded-lg border border-rose-200 bg-rose-50 px-3 py-2 text-sm font-medium text-rose-700">
      {{ error }}
    </div>
  {% endif %}
  <form action="/profile/update" method="post" class="grid gap-3 md:grid-cols-2">
    <label class="block text-sm">
      <span class="mb-1 block font-medium text-slate-700">Name</span>
      <input type="text" name="full_name" value="{{ user.full_name }}" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm" />
    </label>
    <label class="block text-sm">
      <span class="mb-1 block font-medium text-slate-700">Email</span>
      <input type="email" name="email" value="{{ user.email }}" required class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm" />
    </label>
    <div class="md:col-span-2 flex items-center justify-between gap-3 border-t border-slate-100 pt-3">
      <p class="text-xs text-slate-500">Changing your email will require re-verification.</p>
      <button type="submit" class="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-500">Save Profile</button>
    </div>
  </form>
</article>
